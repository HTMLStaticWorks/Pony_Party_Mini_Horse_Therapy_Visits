<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Pony Party account.">
  <title>Register | Pony Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>
  <div class="auth-page">

    <div class="auth-topbar">
      <button class="rtl-toggle">RTL</button>
      <button class="theme-toggle">🌙</button>
    </div>

    <main class="auth-main">
      <div class="auth-card">

        <a href="../index.html" class="auth-logo" style="text-decoration: none;">
          <div class="auth-brand-logo">🐴</div>
          <span class="auth-brand-name">Pony Party</span>
        </a>

        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join families creating magical pony memories</p>

        <form data-form="register" novalidate>
          <div class="form-group">
            <label class="form-label" for="r-name">Full Name</label>
            <input type="text" id="r-name" class="form-control" placeholder="Your full name" data-validate="required" autocomplete="name">
            <span class="form-error" data-error="r-name"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-email">Email Address</label>
            <input type="email" id="r-email" class="form-control" placeholder="you@example.com" data-validate="required|email" autocomplete="email">
            <span class="form-error" data-error="r-email"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-password">Password</label>
            <div class="input-icon-wrap">
              <input type="password" id="r-password" class="form-control" placeholder="Min. 8 characters" data-validate="required|min:8" autocomplete="new-password">
              <button type="button" class="input-icon-btn toggle-password" data-target="r-password" aria-label="Show password">👁️</button>
            </div>
            <span class="form-error" data-error="r-password"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-confirm">Confirm Password</label>
            <div class="input-icon-wrap">
              <input type="password" id="r-confirm" class="form-control" placeholder="Repeat your password" data-validate="required|match:r-password" autocomplete="new-password">
              <button type="button" class="input-icon-btn toggle-password" data-target="r-confirm" aria-label="Show confirm password">👁️</button>
            </div>
            <span class="form-error" data-error="r-confirm"></span>
          </div>

          <div style="margin-bottom:var(--space-5);">
            <label class="form-check">
              <input type="checkbox" id="r-terms" required>
              I agree to the <a href="#" class="auth-link">Terms of Service</a>
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-bottom:var(--space-5);">
            Sign Up
          </button>
        </form>

        <div class="social-divider">Or continue with</div>

        <button class="social-btn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>

        <button class="social-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in here</a>
        </p>
      </div>
    </main>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
