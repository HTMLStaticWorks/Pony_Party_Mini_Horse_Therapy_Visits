<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Pony Party account.">
  <title>Login | Pony Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>
  <div class="auth-page">

    <!-- Top bar with Theme -->
    <div class="auth-topbar">
      <button class="rtl-toggle">RTL</button>
      <button class="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>

    <main class="auth-main">
      <div class="auth-card">

        <!-- Logo -->
        <a href="../index.html" class="auth-logo" style="text-decoration: none;">
          <div class="auth-brand-logo"><i class="fa-solid fa-horse-head" style="color: #fff; font-size: 1.4rem;"></i></div>
          <span class="auth-brand-name">Pony Party</span>
        </a>

        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Access your booking history and pony visit details</p>

        <!-- Login Form -->
        <form data-form="login" novalidate>
          <div class="form-group">
            <label class="form-label" for="l-email">Email Address</label>
            <input type="email" id="l-email" class="form-control" placeholder="you@example.com" data-validate="required|email" autocomplete="email">
            <span class="form-error" data-error="l-email"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="l-password">Password</label>
            <div class="input-icon-wrap">
              <input type="password" id="l-password" class="form-control" placeholder="Enter your password" data-validate="required" autocomplete="current-password">
              <button type="button" class="input-icon-btn toggle-password" data-target="l-password" aria-label="Show password"><i class="fa-regular fa-eye"></i></button>
            </div>
            <span class="form-error" data-error="l-password"></span>
          </div>

          <div class="form-row-between">
            <label class="form-check">
              <input type="checkbox" id="remember"> Remember Me
            </label>
            <a href="#" class="auth-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-bottom:var(--space-5);">
            Sign In
          </button>
        </form>

        <div class="social-divider">Or continue with</div>

        <button class="social-btn">
          <i class="fab fa-google" style="font-size: 1.15rem; color: var(--text-primary);"></i>
          Google
        </button>

        <button class="social-btn">
          <i class="fab fa-apple" style="font-size: 1.15rem; color: var(--text-primary);"></i>
          Apple
        </button>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
    </main>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
